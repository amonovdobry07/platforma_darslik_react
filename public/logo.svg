<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#84cc16"/>
    </linearGradient>
    <linearGradient id="iconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f0fdf4"/>
    </linearGradient>
  </defs>
  
  <!-- Rounded square background -->
  <rect width="512" height="512" rx="100" fill="url(#bgGrad)"/>
  
  <!-- Graduation cap (centered) -->
  <g transform="translate(256, 256)">
    <!-- Cap top -->
    <path 
      d="M -130 -20 L 0 -85 L 130 -20 L 0 45 Z" 
      fill="url(#iconGrad)" 
      stroke="#ffffff" 
      stroke-width="4" 
      stroke-linejoin="round"
    />
    
    <!-- Cap base -->
    <path 
      d="M -75 5 L -75 60 Q -75 90 0 90 Q 75 90 75 60 L 75 5 L 0 45 Z" 
      fill="url(#iconGrad)"
      stroke="#ffffff"
      stroke-width="4"
      stroke-linejoin="round"
    />
    
    <!-- Tassel -->
    <line x1="115" y1="-20" x2="115" y2="50" stroke="#ffffff" stroke-width="6" stroke-linecap="round"/>
    <circle cx="115" cy="60" r="12" fill="#ffffff"/>
  </g>
</svg>